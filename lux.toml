package = "lux.nvim"
version = "3.0.0"
lua = "5.1"

[description]
summary = "🌒 Neovim plugin management inspired by Cargo, powered by luarocks"
labels = [ "lua", "luarocks", "neovim", "neovim-plugin", "nvim", "package-manager", "plugin", "plugin-manager" ]
license = "GPL-3.0"

[dependencies]
"fidget.nvim" = "1.6.0-1"
fzy = "1.0.3-1"
nvim-nio = "1.10.1-1"
"rtp.nvim" = "1.2.0-1"
"pathlib.nvim" = "2.2.3-1"
fallo = "2.2.0-1"
lux-lua = "0.27.0-2"
"mega.cmdparse" = "1.2.1-1"

[test_dependencies]
nlua = "0.3.2-1"

# [run]
# command = "nvim"

[build]
type = "builtin"
copy_directories = [ "doc", "plugin" ]
